<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebSocket Chat Tester</title>
<style>
  :root { --bg: #1e1e2e; --surface: #282a3a; --border: #3e4058; --text: #cdd6f4; --muted: #6c7086; --accent: #89b4fa; --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--surface); padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
  .status-dot.connected { background: var(--green); }
  .status-text { font-size: 12px; color: var(--muted); }
  .config { background: var(--surface); padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .config label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 3px; }
  .config input, .config select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none; }
  .config input:focus { border-color: var(--accent); }
  .config button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-connect { background: var(--accent); color: var(--bg); }
  .btn-disconnect { background: var(--red); color: var(--bg); }
  .main { flex: 1; display: flex; overflow: hidden; }
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .log-panel { width: 380px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .log-panel h3 { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .log-panel h3 button { background: none; border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .messages { flex: 1; overflow-y: auto; padding: 14px 20px; display: flex; flex-direction: column; gap: 8px; }
  .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--bg); }
  .msg.bot { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
  .msg.system { align-self: center; background: none; color: var(--muted); font-size: 12px; font-style: italic; }
  .msg.error { align-self: center; background: none; color: var(--red); font-size: 12px; }
  .msg.audio-msg { display: flex; align-items: center; gap: 8px; }
  .msg.audio-msg audio { height: 32px; }
  .input-bar { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; background: var(--surface); }
  .input-bar input[type="text"] { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 14px; outline: none; }
  .input-bar input[type="text"]:focus { border-color: var(--accent); }
  .input-bar button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .btn-send { background: var(--accent); color: var(--bg); font-weight: 600; }
  .btn-mic { background: var(--surface); border: 1px solid var(--border) !important; color: var(--text); font-size: 16px; width: 40px; text-align: center; }
  .btn-mic.recording { background: var(--red); color: var(--bg); border-color: var(--red) !important; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
  .log-entries { flex: 1; overflow-y: auto; padding: 8px 10px; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 11px; line-height: 1.6; }
  .log-entry { margin-bottom: 2px; }
  .log-entry .dir { display: inline-block; width: 14px; text-align: center; }
  .log-entry .ts { color: var(--muted); margin-right: 6px; }
  .log-entry.in { color: var(--green); }
  .log-entry.out { color: var(--accent); }
  .log-entry.bin { color: var(--yellow); }
  .log-entry.err { color: var(--red); }
  .audio-controls { padding: 8px 20px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 8px; align-items: center; }
  .audio-controls label { font-size: 12px; color: var(--muted); }
  .hidden { display: none; }
  @media (max-width: 800px) { .log-panel { display: none; } }
</style>
</head>
<body>

<header>
  <h1>WebSocket Chat Tester</h1>
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Disconnected</span>
</header>

<div class="config">
  <label>
    Host
    <input id="cfgHost" type="text" value="localhost:8000" style="width:160px" />
  </label>
  <label>
    API Key
    <input id="cfgApiKey" type="text" placeholder="TMP_ACCESS_KEY" style="width:180px" />
  </label>
  <label>
    Chatbot ID
    <input id="cfgChatbotId" type="text" placeholder="uuid" style="width:280px" />
  </label>
  <label>
    Session ID <small>(optional)</small>
    <input id="cfgSessionId" type="text" placeholder="uuid (leave blank for new)" style="width:260px" />
  </label>
  <label>
    Demo
    <select id="cfgDemo"><option value="true" selected>true</option><option value="false">false</option></select>
  </label>
  <button class="btn-connect" id="btnConnect" onclick="toggleConnection()">Connect</button>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <input type="text" id="inputText" placeholder="Type a message…" onkeydown="if(event.key==='Enter')sendQuery()" disabled />
      <button class="btn-send" id="btnSend" onclick="sendQuery()" disabled>Send</button>
      <button class="btn-mic" id="btnMic" onclick="toggleRecording()" title="Hold to record audio" disabled>🎤</button>
    </div>
  </div>
  <div class="log-panel">
    <h3>Protocol Log <button onclick="clearLog()">Clear</button></h3>
    <div class="log-entries" id="logEntries"></div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────
let ws = null;
let heartbeatTimer = null;
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

// ─── Audio receive state ──────────────────────────────────────────
// Binary frames from the server are TTS audio chunks (raw binary, no JSON wrapper).
// We buffer them between audio_start / audio_end JSON messages (legacy path) or
// simply collect every binary frame when the server uses the stream_binary approach.
let receivingAudio = false;
let audioBuffer = [];
let audioMime = 'audio/wav';

// For the "stream_binary" path the server sends no audio_start/audio_end signals,
// so we use a short idle timer: if no binary frame arrives for N ms we treat the
// stream as finished.
let binaryIdleTimer = null;
const BINARY_IDLE_MS = 600; // ms of silence before we consider TTS done

// ─── DOM refs ─────────────────────────────────────────────────────
const $messages   = document.getElementById('messages');
const $log        = document.getElementById('logEntries');
const $input      = document.getElementById('inputText');
const $btnSend    = document.getElementById('btnSend');
const $btnMic     = document.getElementById('btnMic');
const $btnConnect = document.getElementById('btnConnect');
const $statusDot  = document.getElementById('statusDot');
const $statusText = document.getElementById('statusText');

// ─── Helpers ──────────────────────────────────────────────────────
const ts = () => new Date().toISOString().slice(11, 23);

function addMsg(text, cls = 'system') {
  const d = document.createElement('div');
  d.className = `msg ${cls}`;
  d.textContent = text;
  $messages.appendChild(d);
  $messages.scrollTop = $messages.scrollHeight;
  return d;
}

function addAudioMsg(blob, cls = 'bot') {
  const d = document.createElement('div');
  d.className = `msg ${cls} audio-msg`;
  const label = document.createElement('span');
  label.textContent = cls === 'user' ? '🎙️ Sent audio' : '🔊 Audio response';
  const audio = document.createElement('audio');
  audio.controls = true;
  audio.src = URL.createObjectURL(blob);
  d.appendChild(label);
  d.appendChild(audio);
  $messages.appendChild(d);
  $messages.scrollTop = $messages.scrollHeight;
}

function log(dir, text, cls = '') {
  const e = document.createElement('div');
  e.className = `log-entry ${cls}`;
  const arrow = dir === 'in' ? '◀' : dir === 'out' ? '▶' : '●';
  e.innerHTML = `<span class="ts">${ts()}</span><span class="dir">${arrow}</span> ${escHtml(text)}`;
  $log.appendChild(e);
  $log.scrollTop = $log.scrollHeight;
}

function escHtml(s) { const d = document.createElement('span'); d.textContent = s; return d.innerHTML; }

function clearLog() { $log.innerHTML = ''; }

function setConnected(v) {
  $statusDot.classList.toggle('connected', v);
  $statusText.textContent = v ? 'Connected' : 'Disconnected';
  $btnConnect.textContent = v ? 'Disconnect' : 'Connect';
  $btnConnect.className = v ? 'btn-disconnect' : 'btn-connect';
  $input.disabled = !v;
  $btnSend.disabled = !v;
  $btnMic.disabled = !v;
}

// ─── Connection ───────────────────────────────────────────────────
function toggleConnection() {
  if (ws && ws.readyState <= WebSocket.OPEN) { ws.close(); return; }
  connect();
}

function connect() {
  const host      = document.getElementById('cfgHost').value.trim();
  const apiKey    = document.getElementById('cfgApiKey').value.trim();
  const chatbotId = document.getElementById('cfgChatbotId').value.trim();
  const sessionId = document.getElementById('cfgSessionId').value.trim();
  const isDemo    = document.getElementById('cfgDemo').value;

  if (!chatbotId) { alert('Chatbot ID is required'); return; }

  const params = new URLSearchParams({ chatbot_id: chatbotId, is_demo: isDemo });
  if (sessionId) params.set('session_id', sessionId);

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${host}/ws/chat?${params}`;
  log('out', `Connecting to ${url}`);
  addMsg(`Connecting to ${host}…`);

  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setConnected(true);
    log('in', 'WebSocket opened', 'in');
    // Send API key as first message for authentication
    if (apiKey) {
      const authMsg = JSON.stringify({ type: 'auth', payload: { 'x-api-key': apiKey } });
      ws.send(authMsg);
      log('out', authMsg, 'out');
    } else {
      log('out', 'Warning: No API key provided', 'err');
    }
    startHeartbeat();
  };

  ws.onclose = (e) => {
    setConnected(false);
    stopHeartbeat();
    log('in', `WebSocket closed: code=${e.code} reason=${e.reason || '(none)'}`, 'err');
    addMsg(`Disconnected (code ${e.code})`);
    flushAudioBuffer(); // flush any partial audio
  };

  ws.onerror = () => {
    log('in', 'WebSocket error', 'err');
    addMsg('Connection error', 'error');
  };

  ws.onmessage = (evt) => {
    if (evt.data instanceof ArrayBuffer) {
      handleBinaryFrame(evt.data);
      return;
    }
    handleTextFrame(evt.data);
  };
}

// ─── Incoming text frames ─────────────────────────────────────────
function handleTextFrame(raw) {
  log('in', raw, 'in');
  let msg;
  try { msg = JSON.parse(raw); } catch { addMsg(`Non-JSON: ${raw}`); return; }
  const type = msg.type;
  const p = msg.payload || {};

  switch (type) {
    case 'connected':
      addMsg(`Connected — session: ${p.session_id || '?'}, chatbot: ${p.chatbot_name || '?'}`);
      if (p.session_id) document.getElementById('cfgSessionId').value = p.session_id;
      if (p.history && p.history.length) {
        p.history.forEach(h => {
          if (h.query) addMsg(h.query, 'user');
          if (h.answer) addMsg(h.answer, 'bot');
        });
      }
      break;

    case 'typing':
      addMsg('Bot is typing…');
      break;

    case 'response':
      addMsg(p.answer || JSON.stringify(p), 'bot');
      break;

    case 'stream_start':
      // start of a streamed response — show a placeholder
      addMsg('', 'bot').id = 'stream-target';
      break;

    case 'stream_chunk': {
      const target = document.getElementById('stream-target');
      if (target) target.textContent += (p.chunk || p.text || '');
      break;
    }

    case 'stream_end': {
      const target = document.getElementById('stream-target');
      if (target) target.removeAttribute('id');
      break;
    }

    case 'audio_ack':
      addMsg(`Audio received by server (${p.size} bytes)`);
      break;

    case 'audio_start':
      receivingAudio = true;
      audioBuffer = [];
      audioMime = p.mime_type || 'audio/wav';
      addMsg(`Receiving audio (${audioMime})…`);
      break;

    case 'audio_end':
      flushAudioBuffer();
      break;

    case 'pong':
      // heartbeat ack — silent
      break;

    case 'error':
      addMsg(`Error: ${p.error || JSON.stringify(p)}`, 'error');
      break;

    default:
      addMsg(`[${type}] ${JSON.stringify(p)}`);
  }
}

// ─── Incoming binary frames ───────────────────────────────────────
function handleBinaryFrame(buffer) {
  const bytes = new Uint8Array(buffer);
  log('in', `Binary frame: ${bytes.length} bytes`, 'bin');
  audioBuffer.push(bytes);

  // Reset the idle timer — if no more binary arrives within BINARY_IDLE_MS
  // we consider the stream finished and flush.
  clearTimeout(binaryIdleTimer);
  binaryIdleTimer = setTimeout(() => {
    // Only flush if we're not in the legacy audio_start/audio_end path.
    // In that path `receivingAudio` is true and we wait for audio_end.
    if (!receivingAudio && audioBuffer.length > 0) {
      addMsg('Audio stream complete (binary)');
      flushAudioBuffer();
    }
  }, BINARY_IDLE_MS);
}

function flushAudioBuffer() {
  receivingAudio = false;
  clearTimeout(binaryIdleTimer);
  if (audioBuffer.length === 0) return;

  // Concatenate all chunks
  const total = audioBuffer.reduce((s, c) => s + c.length, 0);
  const merged = new Uint8Array(total);
  let offset = 0;
  for (const chunk of audioBuffer) { merged.set(chunk, offset); offset += chunk.length; }
  audioBuffer = [];

  // Detect MIME from magic bytes
  let mime = audioMime;
  if (merged.length >= 12) {
    const header = String.fromCharCode(...merged.slice(0, 4));
    if (header === 'RIFF') mime = 'audio/wav';
    else if (header === 'OggS') mime = 'audio/ogg';
    else if (header === 'fLaC') mime = 'audio/flac';
    else if (merged[0] === 0xFF && (merged[1] & 0xE0) === 0xE0) mime = 'audio/mpeg';
    else if (header.startsWith('ID3')) mime = 'audio/mpeg';
  }

  const blob = new Blob([merged], { type: mime });
  log('in', `Audio assembled: ${total} bytes, type=${mime}`, 'bin');
  addAudioMsg(blob, 'bot');
}

// ─── Sending ──────────────────────────────────────────────────────
function sendQuery() {
  const text = $input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  const msg = JSON.stringify({ type: 'query', payload: { query: text } });
  ws.send(msg);
  log('out', msg, 'out');
  addMsg(text, 'user');
  $input.value = '';
}

// ─── Audio Recording ─────────────────────────────────────────────
async function toggleRecording() {
  if (isRecording) { stopRecording(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    // Prefer WAV-like format; fall back to whatever the browser supports
    const mimeOptions = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', ''];
    let selectedMime = '';
    for (const m of mimeOptions) {
      if (!m || MediaRecorder.isTypeSupported(m)) { selectedMime = m; break; }
    }
    mediaRecorder = new MediaRecorder(stream, selectedMime ? { mimeType: selectedMime } : {});
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const arrayBuf = await blob.arrayBuffer();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(arrayBuf);
        log('out', `Sent audio: ${arrayBuf.byteLength} bytes (${mediaRecorder.mimeType})`, 'out');
        addAudioMsg(blob, 'user');
      }
    };
    mediaRecorder.start();
    isRecording = true;
    $btnMic.classList.add('recording');
    $btnMic.textContent = '⏹';
    addMsg('Recording…');
  } catch (err) {
    addMsg(`Mic error: ${err.message}`, 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  $btnMic.classList.remove('recording');
  $btnMic.textContent = '🎤';
}

// ─── Heartbeat ────────────────────────────────────────────────────
function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      const msg = JSON.stringify({ type: 'heartbeat' });
      ws.send(msg);
      // Don't spam the log with heartbeats – they're visible if needed
    }
  }, 15_000);
}

function stopHeartbeat() {
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
}
</script>
</body>
</html>
